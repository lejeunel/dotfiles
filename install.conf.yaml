- defaults:
    link:
      relink: true

- clean: ['~']

- link:
    ~/.tmux.conf: tmux.conf
    ~/.zsh_custom: zsh_custom
    ~/.zshrc: zshrc
    ~/.gitconfig: gitconfig
    ~/.config: config
    ~/.local: local
    ~/.doom.d: doom.d
    ~/.emacs.d: emacs.d
    ~/.oh-my-zsh: oh-my-zsh
    ~/.toprc: toprc
    ~/.vlc: vlc
    ~/.wallpapers: wallpapers
    ~/.bin: bin

- shell:
  -
    command: git clone --depth 1 https://github.com/doomemacs/doomemacs ~/.emacs.d && ~/.emacs.d/bin/doom install
    description: Installing Doom Emacs
    stdin: true
    stdout: true
  -
    command: chsh -s $(which zsh)
    description: Switch shell to zsh
    stdin: true
    stdout: true
    stderr: true
