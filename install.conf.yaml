- defaults:
    link:
      relink: true

- clean: ['~']

- link:
    ~/.tmux.conf: tmux.conf
    ~/.zsh_custom: zsh_custom
    ~/.zshrc: zshrc
    ~/.gitconfig: gitconfig
    ~/.config: config
    ~/.doom.d: doom.d
    ~/.emacs.d: emacs.d
    ~/.oh-my-zsh: oh-my-zsh
    ~/.toprc: toprc
    ~/.vlc: vlc
    ~/.wallpapers: wallpapers

- shell:
  -
    command: ~/.emacs.d/bin/doom install
    description: Installing Doom Emacs
    stdin: true
    stdout: true
  -
    command: chsh -s $(which zsh)
    description: Switch shell to zsh
    stdin: true
    stdout: true
    stderr: true
  -
    command: curl -sS https://starship.rs/install.sh | sh
    description: Starship shell
    stderr: true
    stdin: true
    stdout: true
  -
    command: ./install-nerd-fonts
    description: Installing nerd fonts
  -
    command: curl --proto '=https' --tlsv1.2 -fsSL https://drop-sh.fullyjustified.net |sh && mv tectonic ~/.local/bin
    description: Installing tectonic
